[build]
  command = "npm run build"
  publish = "dist"

# Reindirizza tutte le richieste /api/* al backend
[[redirects]]
  from = "/api/*"
  to = "https://gestionale-affitti-api.onrender.com/api/:splat"
  status = 200
  force = true

# Gestione SPA - reindirizza tutte le richieste non trovate all'index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200 