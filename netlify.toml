[build]
  command = "npm run build"
  publish = "build"

# Regola per gestire le Single Page Application
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Regola per reindirizzare le chiamate API al backend
[[redirects]]
  from = "/api/*"
  to = "https://gestionaleaffitti.onrender.com/api/:splat"
  status = 200
  force = true 